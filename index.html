<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QR File Receiver</title>
<!-- iPhone có mạng nên nạp jsQR từ CDN cho gọn -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a; color: #fff;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  h1 { font-size: 17px; font-weight: 600; padding: 14px; }
  #camera-wrap { position: relative; width: 100%; max-width: 440px; }
  #video { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #111; }
  #canvas { display: none; }
  .overlay { position: absolute; inset: 0; pointer-events: none; }
  /* ô mờ gợi ý lưới 4x2 của bên gửi */
  .grid-hint { position:absolute; inset:8%; display:grid; grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(2,1fr); gap:4%; }
  .grid-hint > div { border:1.5px dashed rgba(74,222,128,0.35); border-radius:8px; }
  #status { font-size: 13px; color: #4ade80; padding: 10px 16px 4px; text-align: center; min-height: 34px; }
  #progress-wrap { width: calc(100% - 32px); max-width: 408px; margin: 6px 0; }
  #progress-bar-bg { background: #222; border-radius: 99px; height: 10px; overflow: hidden; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 99px; width: 0%; transition: width 0.25s ease; }
  #progress-text { font-size: 12px; color: #888; text-align: center; margin-top: 4px; }
  #chunk-grid { display: flex; flex-wrap: wrap; gap: 2px; max-height: 78px; overflow: hidden; margin: 10px 16px; justify-content:center; }
  .chunk-dot { width: 8px; height: 8px; border-radius: 2px; background: #222; }
  .chunk-dot.got { background: #4ade80; }
  #banner { display: none; border-radius: 12px; padding: 13px 18px; margin: 8px 16px; text-align: center; font-size: 14px; line-height: 1.55; }
  #banner.ok  { background: #14532d; border: 1px solid #22c55e; }
  #banner.bad { background: #4c1d1d; border: 1px solid #ef4444; }
  #btn-wrap { display: flex; gap: 10px; padding: 10px 16px 22px; width: 100%; max-width: 440px; }
  button { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
  #btn-start    { background: #22c55e; color: #000; }
  #btn-reset    { background: #222;    color: #fff; }
  #btn-download { background: #3b82f6; color: #fff; display: none; }
  a.dl-unverified { color:#fca5a5; font-size:12px; text-decoration:underline; cursor:pointer; }
</style>
</head>
<body>
<h1>📡 QR File Receiver</h1>
<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="overlay"><div class="grid-hint"><div></div><div></div><div></div><div></div></div></div>
</div>
<div id="status">Nhấn Bắt đầu để mở camera</div>
<div id="progress-wrap">
  <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  <div id="progress-text">Chưa nhận block nào</div>
</div>
<div id="chunk-grid"></div>
<div id="banner"></div>
<div id="btn-wrap">
  <button id="btn-start"    onclick="startScan()">▶ Bắt đầu</button>
  <button id="btn-reset"    onclick="resetAll()">↺ Reset</button>
  <button id="btn-download" onclick="downloadFile(true)">⬇ Tải file</button>
</div>

<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status');
const progBar  = document.getElementById('progress-bar');
const progText = document.getElementById('progress-text');
const grid     = document.getElementById('chunk-grid');
const banner   = document.getElementById('banner');
const btnDl    = document.getElementById('btn-download');

// PHẢI KHỚP với COLS/ROWS bên FileSender.java. Receiver cắt khung camera thành
// GRID_COLS×GRID_ROWS vùng (có chồng mép) rồi chạy jsQR từng vùng, vì jsQR chỉ
// trả 1 QR mỗi lần gọi. Cắt khớp lưới -> mỗi vùng đúng 1 QR -> bắt đủ 8 QR/khung.
const GRID_COLS = 2;
const GRID_ROWS = 2;
const REGION_OVERLAP = 0.12;   // chồng 12% sang vùng kế -> QR vắt qua mép vẫn lọt

// ── FOUNTAIN (LT) — PHẢI khớp FileSender.java ──
const SYS_PERIOD = 6;     // = FOUNTAIN_SYS_PERIOD bên Java

let K = -1;               // số block nguồn
let B = -1;               // byte/block (lấy từ độ dài droplet đầu tiên)
let lastLen = -1;         // độ dài thực block cuối
let expectedCrc = null;   // CRC32 hex cả file
let cumsum = null;        // CDF Ideal Soliton (dài K+1)
let solved = null;        // Array(K): Uint8Array(B) đã giải, hoặc null
let solvedCount = 0;
let blockToPending = null;// Array(K): Set droplet bậc>1 đang chứa block đó (chỉ mục peeling)
let seenN = null;         // Set n đã nhận -> bỏ trùng
let scanning = false, animId = null, fileData = null;

// ===== Bộ sinh xác định — giống hệt Java (mulberry32 + Ideal Soliton) =====
function mulberry32(a) {
  return function () {
    a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function buildSolitonCdf(k) {
  const c = new Float64Array(k + 1);
  c[0] = 0;
  c[1] = 1.0 / k;
  for (let d = 2; d <= k; d++) c[d] = c[d - 1] + 1.0 / (d * (d - 1));
  return c;
}
function degreeFromU(u) {
  let lo = 1, hi = K;
  while (lo < hi) { const mid = (lo + hi) >>> 1; if (cumsum[mid] >= u) hi = mid; else lo = mid + 1; }
  return lo;
}
function dropletBlocks(n) {
  if (n % SYS_PERIOD === 0) return [Math.floor(n / SYS_PERIOD) % K];
  const rng = mulberry32(n);
  const u = rng();
  const d = degreeFromU(u);
  const res = [];
  while (res.length < d) {
    let idx = Math.floor(rng() * K);
    if (idx >= K) idx = K - 1;
    if (res.indexOf(idx) < 0) res.push(idx);
  }
  return res;
}
function xorInto(dst, src) { for (let i = 0; i < dst.length; i++) dst[i] ^= src[i]; }

// ── CRC32 (zlib, poly 0xEDB88320) — khớp java.util.zip.CRC32 bên gửi ──
function crc32(u8) {
  let c = ~0;
  for (let i = 0; i < u8.length; i++) {
    c ^= u8[i];
    for (let k = 0; k < 8; k++) c = (c >>> 1) ^ (0xEDB88320 & -(c & 1));
  }
  return ((~c) >>> 0).toString(16).padStart(8, '0');
}

async function startScan() {
  if (typeof jsQR !== 'function') {
    statusEl.textContent = '❌ Chưa nạp được jsQR (cần mạng lần đầu để tải thư viện).';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      // Độ phân giải cao hơn -> mỗi QR có nhiều pixel camera hơn -> đọc được lưới
      // dày (4x2 = 8 QR) mà không bị mờ. iPhone đời mới thừa sức 1920.
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1920 } }
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    setStartBtn('⏸ Dừng', stopScan);
    statusEl.textContent = 'Đang quét... hướng camera vào lưới QR trên màn hình PC';
    loop();
  } catch (e) {
    statusEl.textContent = '❌ Không mở được camera: ' + e.message;
  }
}

function stopScan() {
  scanning = false;
  if (animId) cancelAnimationFrame(animId);
  setStartBtn('▶ Tiếp tục', resumeScan);
  statusEl.textContent = '⏸ Đã dừng';
}
function resumeScan() {
  scanning = true;
  setStartBtn('⏸ Dừng', stopScan);
  statusEl.textContent = 'Đang quét...';
  loop();
}
function setStartBtn(text, fn) {
  const b = document.getElementById('btn-start');
  b.textContent = text; b.onclick = fn;
}

// Quét NHẸ theo round-robin: mỗi vòng requestAnimationFrame chỉ xử lý MỘT vùng
// (luân phiên qua GRID_COLS×GRID_ROWS) thay vì decode cả 4 vùng + full-frame một
// lúc như cũ. Mỗi vòng nhẹ ~4 lần -> rAF chạy nhanh hơn nhiều -> nhận diện tức thì
// hơn. drawImage chỉ vẽ ĐÚNG vùng nguồn -> getImageData + jsQR chỉ trên ~1/4 ảnh,
// khỏi cần copy thủ công (sliceRegion cũ). Trùng n -> handleCode tự bỏ.
const FULL_SCAN_EVERY = 8;   // thi thoảng quét cả khung -> bắt QR vắt qua ranh giới vùng
let frameCounter = 0;
let regionIdx = 0;

function scanRegion(x, y, w, h) {
  if (w <= 0 || h <= 0) return;
  canvas.width = w; canvas.height = h;
  ctx.drawImage(video, x, y, w, h, 0, 0, w, h);   // chỉ vẽ vùng nguồn -> rẻ
  const img = ctx.getImageData(0, 0, w, h);
  const code = jsQR(img.data, w, h, { inversionAttempts: 'dontInvert' });
  if (code && code.binaryData && code.binaryData.length) handleCode(code.binaryData);
}

function loop() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const w = video.videoWidth, h = video.videoHeight;

    if (frameCounter % FULL_SCAN_EVERY === 0) {
      // quét cả khung (thưa) -> bắt QR nằm vắt qua ranh giới giữa các vùng
      canvas.width = w; canvas.height = h;
      ctx.drawImage(video, 0, 0);
      const full = ctx.getImageData(0, 0, w, h);
      const code = jsQR(full.data, w, h, { inversionAttempts: 'dontInvert' });
      if (code && code.binaryData && code.binaryData.length) handleCode(code.binaryData);
    } else {
      // chỉ MỘT vùng/vòng (round-robin) -> vòng lặp nhẹ, nhận diện nhanh
      const cw = Math.floor(w / GRID_COLS);
      const chh = Math.floor(h / GRID_ROWS);
      const ox = Math.floor(cw * REGION_OVERLAP);
      const oy = Math.floor(chh * REGION_OVERLAP);
      const idx = regionIdx % (GRID_COLS * GRID_ROWS);
      const c = idx % GRID_COLS, r = Math.floor(idx / GRID_COLS);
      const x = Math.max(0, c * cw - ox);
      const y = Math.max(0, r * chh - oy);
      const rw = Math.min(w - x, cw + 2 * ox);
      const rh = Math.min(h - y, chh + 2 * oy);
      regionIdx++;
      scanRegion(x, y, rw, rh);
    }
    frameCounter++;
  }
  animId = requestAnimationFrame(loop);
}

let completed = false;

function handleCode(bd) {
  // bd = byte. Header "n/K/lastlen/crc:" rồi B byte droplet (đã XOR).
  let colon = -1;
  for (let i = 0; i < bd.length && i < 48; i++) { if (bd[i] === 0x3A) { colon = i; break; } }
  if (colon < 0) return;
  let header = '';
  for (let i = 0; i < colon; i++) header += String.fromCharCode(bd[i]);
  const parts = header.split('/');
  if (parts.length !== 4) return;
  const n = parseInt(parts[0], 10);
  const kk = parseInt(parts[1], 10);
  const ll = parseInt(parts[2], 10);
  const crc = parts[3];
  if (isNaN(n) || isNaN(kk) || isNaN(ll) || n < 0 || kk <= 0 || ll < 1) return;

  // Khởi tạo trạng thái fountain từ droplet đầu tiên (chỉ chốt khi header hợp lệ)
  if (K < 0) {
    B = bd.length - (colon + 1);
    if (B <= 0 || ll > B) return;             // header hỏng -> chưa chốt, đợi droplet sau
    K = kk; lastLen = ll; expectedCrc = crc;
    cumsum = buildSolitonCdf(K);
    solved = new Array(K).fill(null);
    blockToPending = Array.from({ length: K }, () => new Set());
    seenN = new Set();
    solvedCount = 0; completed = false;
    initGrid(K);
  }
  // Loại droplet của FILE KHÁC (cùng K nhưng crc/lastLen khác) trước khi XOR vào hệ
  if (kk !== K || crc !== expectedCrc || ll !== lastLen) return;
  const dataLen = bd.length - (colon + 1);
  if (dataLen !== B) return;                  // độ dài droplet sai -> bỏ
  if (seenN.has(n)) return;                   // trùng -> bỏ
  seenN.add(n);

  const data = Uint8Array.from(bd.slice(colon + 1));
  const bl = dropletBlocks(n);
  // Khử các block đã biết -> còn lại các block chưa biết
  const remaining = [];
  for (const b of bl) {
    if (solved[b]) xorInto(data, solved[b]);
    else remaining.push(b);
  }
  addDroplet({ data: data, blocks: remaining, active: true });

  updateProgress();
  if (!completed) statusEl.textContent = `✅ ${solvedCount}/${K} block • đã nhận ${seenN.size} droplet`;
}

function addDroplet(drop) {
  if (drop.blocks.length === 0) return;             // dư thừa
  if (drop.blocks.length === 1) { solveBlock(drop.blocks[0], drop.data); return; }
  // chỉ mục thật là blockToPending (đủ cho peeling); không cần mảng pending riêng
  for (const b of drop.blocks) blockToPending[b].add(drop);
}

function removePending(drop) {
  drop.active = false;
  for (const b of drop.blocks) blockToPending[b].delete(drop);
}

// Peeling decoder (lặp, không đệ quy -> tránh tràn stack với K lớn).
// Dùng con trỏ head thay queue.shift() -> O(K) thay vì O(K^2) khi K lớn.
function solveBlock(b0, data0) {
  const queue = [[b0, data0]];
  let head = 0;
  while (head < queue.length) {
    const [b, data] = queue[head++];
    if (solved[b]) continue;
    solved[b] = data; solvedCount++; markDot(b);
    const lst = [...blockToPending[b]];
    blockToPending[b].clear();
    for (const drop of lst) {
      if (!drop.active) continue;
      xorInto(drop.data, data);
      drop.blocks = drop.blocks.filter(x => x !== b);
      if (drop.blocks.length === 1) { removePending(drop); queue.push([drop.blocks[0], drop.data]); }
      else if (drop.blocks.length === 0) { removePending(drop); }
    }
  }
  updateProgress();
  if (solvedCount === K && !completed) { completed = true; onComplete(); }
}

function initGrid(tot) {
  grid.innerHTML = '';
  const show = Math.min(tot, 600);
  for (let i = 0; i < show; i++) {
    const d = document.createElement('div');
    d.className = 'chunk-dot'; d.id = 'dot-' + i;
    grid.appendChild(d);
  }
}
function markDot(idx) { const d = document.getElementById('dot-' + idx); if (d) d.classList.add('got'); }
function updateProgress() {
  const pct = K > 0 ? (solvedCount / K * 100).toFixed(1) : 0;
  progBar.style.width = pct + '%';
  progText.textContent = `${solvedCount} / ${K} block giải được (${pct}%)`;
}

function onComplete() {
  stopScan();
  statusEl.textContent = '🧩 Đủ block! Đang ghép & kiểm tra...';
  setTimeout(() => {
    // ghép K block theo thứ tự, cắt block cuối về lastLen
    const totalLen = (K - 1) * B + lastLen;
    const bytes = new Uint8Array(totalLen);
    for (let i = 0; i < K; i++) {
      const len = (i === K - 1) ? lastLen : B;
      bytes.set(solved[i].subarray(0, len), i * B);
    }
    fileData = bytes;
    solved = null; blockToPending = null;   // giải phóng ~30MB sau khi đã ghép

    const got = crc32(bytes);
    if (got === expectedCrc) {
      banner.className = 'ok';
      banner.style.display = 'block';
      banner.innerHTML = `✅ <strong>Ghép & verify thành công</strong><br>
        Kích thước: ${formatSize(bytes.length)}<br>
        CRC32 khớp (<code>${got}</code>) — file chuẩn 100%.`;
      btnDl.style.display = 'block';
      statusEl.textContent = 'Hoàn tất!';
    } else {
      banner.className = 'bad';
      banner.style.display = 'block';
      banner.innerHTML = `❌ <strong>CRC32 KHÔNG khớp</strong><br>
        Nhận <code>${got}</code>, cần <code>${expectedCrc}</code>.<br>
        Có chunk bị lỗi. Hãy <strong>Reset</strong> và quét lại.<br>
        <a class="dl-unverified" onclick="downloadFile(false)">tải bản chưa verify (không khuyến nghị)</a>`;
      statusEl.textContent = '❌ File có thể hỏng — quét lại.';
    }
  }, 200);
}

function downloadFile() {
  if (!fileData) return;
  const blob = new Blob([fileData], { type: 'application/zip' });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'source-code.zip';
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  stopScan();
  K = -1; B = -1; lastLen = -1; expectedCrc = null; cumsum = null;
  solved = null; solvedCount = 0; blockToPending = null;
  seenN = null; completed = false; fileData = null;
  grid.innerHTML = '';
  banner.style.display = 'none';
  btnDl.style.display = 'none';
  progBar.style.width = '0%';
  progText.textContent = 'Chưa nhận block nào';
  statusEl.textContent = 'Đã reset. Nhấn Bắt đầu để quét lại.';
  setStartBtn('▶ Bắt đầu', startScan);
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}
</script>
</body>
</html>
